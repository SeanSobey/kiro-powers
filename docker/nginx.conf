worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Required for Streamable HTTP + SSE fallback
  proxy_buffering off;
  proxy_cache off;
  proxy_http_version 1.1;
  chunked_transfer_encoding off;

  # Pass through all headers including session IDs
  proxy_pass_request_headers on;

  # Increase timeouts for long-lived SSE connections
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  server {
    listen 3000;

    # ── DNS rebinding protection ───────────────────────────
    # Reject requests where the Host header isn't localhost.
    # Browsers always send the attacker's domain as Host in a
    # rebinding attack, so this blocks it without token management.
    if ($host !~* ^(localhost|127\.0\.0\.1)$) {
      return 403;
    }

    # ── API-only ───────────────────────────────────────────
    location /context7/ {
      proxy_pass http://context7:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /fetch/ {
      proxy_pass http://fetch:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # github-extras must come before /github/
    location /github-extras/ {
      proxy_pass http://github-extras:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /github/ {
      proxy_pass http://github:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /notion/ {
      proxy_pass http://notion:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /youtube/ {
      proxy_pass http://youtube:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Staging ────────────────────────────────────────────
    location /chart/ {
      proxy_pass http://chart:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /markitdown/ {
      proxy_pass http://markitdown:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # location /pandoc/ {
    #   proxy_pass http://pandoc:8000/;
    #   proxy_set_header Host $host;
    #   proxy_set_header X-Real-IP $remote_addr;
    # }

    location /pdf-reader/ {
      proxy_pass http://pdf-reader:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── CDP ────────────────────────────────────────────────
    location /chrome-devtools/ {
      proxy_pass http://chrome-devtools:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
