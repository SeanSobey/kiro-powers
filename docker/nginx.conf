worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Required for Streamable HTTP + SSE fallback
  proxy_buffering off;
  proxy_cache off;
  proxy_http_version 1.1;
  chunked_transfer_encoding off;

  # Pass through all headers including session IDs
  proxy_pass_request_headers on;

  # Increase timeouts for long-lived SSE connections
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  server {
    listen 3000;

    # ── Runtime DNS resolution ─────────────────────────────
    # Docker's embedded DNS. Using variables in proxy_pass forces
    # nginx to resolve at request time instead of startup, so it
    # won't crash if an upstream container isn't running yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── DNS rebinding protection ───────────────────────────
    # Reject requests where the Host header isn't localhost.
    # Browsers always send the attacker's domain as Host in a
    # rebinding attack, so this blocks it without token management.
    if ($host !~* ^(localhost|127\.0\.0\.1)$) {
      return 403;
    }

    # ── API-only ───────────────────────────────────────────
    location /context7/ {
      set $upstream http://context7:8000;
      rewrite ^/context7/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /fetch/ {
      set $upstream http://fetch:8000;
      rewrite ^/fetch/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # github-extras must come before /github/
    location /github-extras/ {
      set $upstream http://github-extras:8000;
      rewrite ^/github-extras/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /github/ {
      set $upstream http://github:8000;
      rewrite ^/github/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /notion/ {
      set $upstream http://notion:8000;
      rewrite ^/notion/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /youtube/ {
      set $upstream http://youtube:8000;
      rewrite ^/youtube/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Staging ────────────────────────────────────────────
    location /chart/ {
      set $upstream http://chart:8000;
      rewrite ^/chart/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /markitdown/ {
      set $upstream http://markitdown:8000;
      rewrite ^/markitdown/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /pandoc/ {
      set $upstream http://pandoc:8000;
      rewrite ^/pandoc/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /pdf-reader/ {
      set $upstream http://pdf-reader:8000;
      rewrite ^/pdf-reader/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── CDP ────────────────────────────────────────────────
    location /chrome-devtools/ {
      set $upstream http://chrome-devtools:8000;
      rewrite ^/chrome-devtools/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Docker ─────────────────────────────────────────────
    location /docker/ {
      set $upstream http://docker:8000;
      rewrite ^/docker/(.*) /$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
