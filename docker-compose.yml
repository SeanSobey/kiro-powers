# ─────────────────────────────────────────────────────────────────────────────
# MCP Power Servers — served over HTTP via supergateway (stdio → Streamable HTTP)
# behind a single nginx reverse proxy on port 3000.
#
# Tiers:
#   API-only    — Pure network services, no host access needed
#   Staging     — Read/write via shared /staging volume
#   CDP         — Connects to host Chrome via DevTools Protocol
#
# Host-only powers (disabled here, run via stdio on host):
#   filesystem, git, npm, playwright, sqlite
#
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. docker compose build
#   3. docker compose up -d
#   4. Powers connect to http://localhost:3000/<server-name>/mcp
# ─────────────────────────────────────────────────────────────────────────────

x-healthcheck: &healthcheck
  healthcheck:
    test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:8000/healthz\",r=>{process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))'"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

x-node-service: &node-service
  restart: unless-stopped
  build:
    context: .
    dockerfile: docker/node.Dockerfile
  expose:
    - "8000"
  environment:
    NODE_OPTIONS: "--max-old-space-size=128"
  deploy:
    resources:
      limits:
        memory: 256M
  <<: *healthcheck

services:
  # ── nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  # ═══════════════════════════════════════════════════════════════════════════
  # API-only — no host access needed
  # ═══════════════════════════════════════════════════════════════════════════

  # ── context7 ─────────────────────────────────────────────────────────────
  context7:
    <<: *node-service
    build:
      context: .
      dockerfile: docker/node.Dockerfile
      args:
        MCP_PACKAGE: "@upstash/context7-mcp@2.2.3"
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "node /srv/node_modules/.bin/context7-mcp", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]
    environment:
      NODE_OPTIONS: "--max-old-space-size=128"
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}

  # ── fetch ────────────────────────────────────────────────────────────────
  fetch:
    <<: *node-service
    build:
      context: .
      dockerfile: docker/node.Dockerfile
      args:
        MCP_PACKAGE: "fetch-mcp@0.0.5"
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "node /srv/node_modules/.bin/fetch-mcp", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]

  # ── github ───────────────────────────────────────────────────────────────
  github:
    <<: *node-service
    build:
      context: .
      dockerfile: docker/node.Dockerfile
      args:
        MCP_PACKAGE: "@modelcontextprotocol/server-github"
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "node /srv/node_modules/.bin/mcp-server-github", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]
    environment:
      NODE_OPTIONS: "--max-old-space-size=128"
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}

  # ── github-extras (local server) ────────────────────────────────────────
  github-extras:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/local-server.Dockerfile
      args:
        SERVER_DIR: mcp/github-extras
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 256M
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "node /app/server.js", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]
    environment:
      NODE_OPTIONS: "--max-old-space-size=128"
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}

  # ── notion ───────────────────────────────────────────────────────────────
  notion:
    <<: *node-service
    build:
      context: .
      dockerfile: docker/node.Dockerfile
      args:
        MCP_PACKAGE: "@notionhq/notion-mcp-server"
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "node /srv/node_modules/.bin/notion-mcp-server", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]
    environment:
      NODE_OPTIONS: "--max-old-space-size=128"
      OPENAPI_MCP_HEADERS: '{"Authorization":"Bearer ${NOTION_API_KEY}","Notion-Version":"2022-06-28"}'

  # ── youtube ──────────────────────────────────────────────────────────────
  youtube:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/youtube.Dockerfile
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 256M
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "node /srv/node_modules/.bin/youtube-mcp", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]
    environment:
      NODE_OPTIONS: "--max-old-space-size=128"
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}

  # ═══════════════════════════════════════════════════════════════════════════
  # Docker — manages sibling containers via Docker socket
  # ═══════════════════════════════════════════════════════════════════════════

  # ── docker ───────────────────────────────────────────────────────────────
  docker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/docker-mcp.Dockerfile
    expose:
      - "8000"
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 256M
    <<: *healthcheck

  # ═══════════════════════════════════════════════════════════════════════════
  # Staging — shared /staging volume for file I/O
  # ═══════════════════════════════════════════════════════════════════════════

  # ── chart ────────────────────────────────────────────────────────────────
  chart:
    <<: *node-service
    build:
      context: .
      dockerfile: docker/node.Dockerfile
      args:
        MCP_PACKAGE: "@ax-crew/chartjs-mcp-server@3.2.1"
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "node /srv/node_modules/.bin/chartjs-mcp-server", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]
    volumes:
      - ${STAGING_DIR}/chart:/staging

  # ── pandoc (Python + Node) ────────────────────────────────────────────
  pandoc:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/pandoc.Dockerfile
    expose:
      - "8000"
    environment:
      NODE_OPTIONS: "--max-old-space-size=128"
    deploy:
      resources:
        limits:
          memory: 512M
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "uv run /srv/server.py", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]
    volumes:
      - ${STAGING_DIR}/pandoc:/staging

  # ── markitdown (Python + Node) ──────────────────────────────────────────
  markitdown:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/markitdown.Dockerfile
    expose:
      - "8000"
    environment:
      NODE_OPTIONS: "--max-old-space-size=128"
    deploy:
      resources:
        limits:
          memory: 384M
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "uv run /srv/server.py", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]
    volumes:
      - ${STAGING_DIR}/markitdown:/staging

  # ── pdf-reader ───────────────────────────────────────────────────────────
  pdf-reader:
    <<: *node-service
    build:
      context: .
      dockerfile: docker/node.Dockerfile
      args:
        MCP_PACKAGE: "@sylphx/pdf-reader-mcp@2.3.1"
    entrypoint: ["node", "/srv/node_modules/.bin/supergateway", "--stdio", "node /srv/node_modules/.bin/pdf-reader-mcp", "--outputTransport", "streamableHttp", "--port", "8000", "--stateful", "--sessionTimeout", "300000", "--healthEndpoint", "/healthz"]
    volumes:
      - ${STAGING_DIR}/pdf-reader:/staging

  # ═══════════════════════════════════════════════════════════════════════════
  # CDP — connects to host browser
